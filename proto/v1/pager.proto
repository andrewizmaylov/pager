syntax = "proto3";

package pager;

option go_package = "github.com/andrewizmaylov/pager;pagerv01";

service Pager {
  rpc RegisterUser (RegisterUserRequest) returns (UserResponse) {};
  rpc LoginUser (LoginUserRequest) returns (LoginUserResponse) {};
  rpc ListRegisteredUsers (UserListRequest) returns (stream UserResponse) {};
  rpc SendMessage (SendMessageRequest) returns (DeliveryToServerResponse) {};
}

message RegisterUserRequest {
  string name = 1;
  string email = 2;
  string password = 3;
}

message LoginUserRequest {
  string email = 1;
  string password = 2;
}

message UserResponse {
  int32 id = 1;
  string name = 2;
  string email = 3;
  string password = 4;
}

message LoginUserResponse {
  int32 id = 1;
  string token = 2;
}

message SendMessageRequest {
  int32 from = 1;
  int32 to = 2;
  string content = 3;
}

message DeliveryToServerResponse {
  int32 id = 1;
  int32 from = 2;
  int32 to = 3;
  string content = 4;
  string status = 5;
}

message UserListRequest {
  int64 total = 1;
}
